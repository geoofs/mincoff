<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coffetera</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    
    /* Background Full Gambar */
    background:url('Wallpaper.png') center center/cover no-repeat;
    
    position:relative;
}

/* Overlay agar tombol lebih jelas */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.25);
    z-index:0;
}

.container{
    width:100%;
    max-width:500px;
    padding:20px;
    text-align:center;
    position:relative;
    z-index:1;
}

.logo{
    width:230px;
    max-width:80%;
    margin-bottom:40px;
    animation:fadeIn 1s ease;
}

.btn{
    display:block;
    width:100%;
    padding:18px 25px;
    margin:18px 0;
    text-decoration:none;

    background:#FFFDD0;
    color:#5C4033;

    border-radius:999px;

    font-size:17px;
    font-weight:700;
    letter-spacing:0.5px;

    box-shadow:0 8px 20px rgba(0,0,0,0.25);

    transition:all .25s ease;
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 30px rgba(0,0,0,0.3);
}

.btn:active{
    transform:scale(0.95);
}

.footer{
    margin-top:35px;
    color:white;
    font-size:13px;
    text-shadow:0 2px 6px rgba(0,0,0,0.4);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="Logocoffetera.png" alt="Logo Coffetera" class="logo">

    <a href="https://geoofs.github.io/coffeterra/" target="_blank" class="btn">
        COFFETERA
    </a>

    <a href="https://drive.google.com/file/d/1xd_XFUtu5QMqPt7waYLwfcaLOzbRJphH/view?usp=drive_link" target="_blank" class="btn">
        BOOKLET WEBGIS COFFETERA
    </a>

    <div class="footer">
        © 2026 Coffetera
    </div>

</div>

</body>
</html>
