<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COFFETERA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden; /* Tidak bisa scroll */
}

body{
    font-family:'Poppins',sans-serif;

    /* Background Gradasi Putih - Cream - Orange */
    background:linear-gradient(
        180deg,
        #FFFFFF 0%,
        #FFF8E8 45%,
        #FFE7C2 75%,
        #FFD199 100%
    );

    display:flex;
    justify-content:center;
    align-items:flex-start;
}

.container{
    width:100%;
    max-width:500px;

    padding:60px 20px 30px;

    text-align:center;
}

/* Logo */
.logo{
    width:220px;
    max-width:75%;

    margin-bottom:15px;

    animation:fadeDown .8s ease;
}

/* Tombol */
.btn{
    display:block;
    width:100%;

    padding:18px 24px;
    margin-bottom:12px;

    text-decoration:none;

    color:#FFFFFF;

    background:linear-gradient(
        135deg,
        #FF8C42,
        #FF6B35
    );

    border-radius:999px;

    font-size:16px;
    font-weight:700;

    letter-spacing:.4px;

    box-shadow:0 10px 25px rgba(255,107,53,.25);

    transition:all .25s ease;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(255,107,53,.35);
}

.btn:active{
    transform:scale(.96);
}

/* Footer */
.footer{
    margin-top:20px;

    color:#8B5E3C;

    font-size:12px;
    font-weight:500;
}

/* Animasi */
@keyframes fadeDown{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Mobile */
@media (max-width:768px){

    .container{
        padding:55px 18px 20px;
    }

    .logo{
        width:190px;
        max-width:72%;
        margin-bottom:12px;
    }

    .btn{
        padding:16px 20px;
        font-size:15px;
        margin-bottom:10px;
    }

    .footer{
        margin-top:15px;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- Logo -->
    <img src="Logocoffetera.png" alt="COFFETERA" class="logo">

    <!-- Tombol Coffetera -->
    <a href="https://geoofs.github.io/coffeterra/" target="_blank" class="btn">
        COFFETERA
    </a>

    <!-- Tombol Booklet -->
    <a href="https://drive.google.com/file/d/1xd_XFUtu5QMqPt7waYLwfcaLOzbRJphH/view?usp=drive_link" target="_blank" class="btn">
        BOOKLET WEBGIS COFFETERA
    </a>

    <!-- Footer -->
    <div class="footer">
        © 2026 Coffetera
    </div>

</div>

</body>
</html>
